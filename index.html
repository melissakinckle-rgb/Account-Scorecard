<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account Health · Cro Metrics</title>
<style>
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --border: #e6e4df;
    --border-soft: #efede8;
    --ink: #1c1b18;
    --muted: #75726b;
    --faint: #a3a099;
    --accent: #1a56db;
    --green-t: #1a7f43; --green-b: #e9f6ee; --green-br: #cdeadb;
    --yellow-t: #96700a; --yellow-b: #fbf3dc; --yellow-br: #eede9f;
    --orange-t: #b4530a; --orange-b: #fdeee1; --orange-br: #f5d5b8;
    --red-t: #b42318; --red-b: #fdebe9; --red-br: #f5c6c0;
    --gray-t: #6b6b66; --gray-b: #f0efec; --gray-br: #dddbd4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 14px; line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .wrap { max-width: 980px; margin: 0 auto; padding: 40px 28px 80px; }

  .eyebrow {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; color: var(--muted); letter-spacing: .02em;
    padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }
  .eyebrow .right { color: var(--faint); }

  h1.title { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; }
  .meta { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .meta code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
    background: var(--gray-b); border: 1px solid var(--border-soft); border-radius: 4px; padding: 0 5px;
  }

  /* Pills */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: .01em;
    border-radius: 999px; padding: 3px 11px; border: 1px solid var(--gray-br);
    background: var(--gray-b); color: var(--gray-t); white-space: nowrap;
  }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .pill.green  { background: var(--green-b);  color: var(--green-t);  border-color: var(--green-br); }
  .pill.yellow { background: var(--yellow-b); color: var(--yellow-t); border-color: var(--yellow-br); }
  .pill.orange { background: var(--orange-b); color: var(--orange-t); border-color: var(--orange-br); }
  .pill.red    { background: var(--red-b);    color: var(--red-t);    border-color: var(--red-br); }
  .pill.lg { font-size: 14px; padding: 6px 16px; }

  /* Metric strip */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 26px 0; }
  .metric {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
  }
  .metric .k { font-size: 11.5px; color: var(--muted); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .metric .v { font-size: 24px; font-weight: 750; margin-top: 4px; letter-spacing: -0.01em; }
  .metric .s { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Sections */
  .section {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 18px; overflow: hidden;
  }
  .section-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
    padding: 18px 22px 14px; border-bottom: 1px solid var(--border-soft);
  }
  .section-head h2 { font-size: 16px; font-weight: 750; letter-spacing: -0.01em; }
  .section-head .sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .section-body { padding: 8px 22px 18px; }

  /* Behavior rows */
  .brow {
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
    padding: 13px 0; border-bottom: 1px solid var(--border-soft);
  }
  .brow:last-of-type { border-bottom: none; }
  .brow .info { flex: 1; min-width: 0; }
  .brow .label { font-weight: 600; font-size: 13.5px; }
  .brow .crit { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .tags { display: inline-flex; gap: 5px; margin-left: 8px; vertical-align: 1px; }
  .tag {
    font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    color: var(--faint); border: 1px solid var(--border); border-radius: 4px; padding: 0 5px;
    background: #fbfbf9;
  }

  /* Segmented control */
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; background: #fbfbf9; }
  .seg button {
    appearance: none; border: none; background: transparent; cursor: pointer;
    font: inherit; font-size: 12px; font-weight: 600; color: var(--faint);
    padding: 6px 12px; border-left: 1px solid var(--border-soft); transition: background .12s, color .12s;
  }
  .seg button:first-child { border-left: none; }
  .seg button:hover { color: var(--muted); background: var(--gray-b); }
  .seg button.on-healthy  { background: var(--green-b);  color: var(--green-t); }
  .seg button.on-warning  { background: var(--yellow-b); color: var(--yellow-t); }
  .seg button.on-critical { background: var(--red-b);    color: var(--red-t); }

  textarea.notes {
    width: 100%; margin-top: 12px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px; background: #fdfdfc;
    font: inherit; font-size: 13px; color: var(--ink); resize: vertical; min-height: 44px;
  }
  textarea.notes:focus { outline: none; border-color: #c9c6bd; }
  textarea.notes::placeholder { color: var(--faint); }

  /* Table (portfolio) */
  table.roster { width: 100%; border-collapse: collapse; background: var(--card); }
  .table-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table.roster th {
    text-align: left; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); background: #fbfbf9; padding: 11px 16px; border-bottom: 1px solid var(--border);
  }
  table.roster td { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); font-size: 13.5px; vertical-align: middle; }
  table.roster tr:last-child td { border-bottom: none; }
  table.roster tbody tr { cursor: pointer; }
  table.roster tbody tr:hover { background: #fbfbf8; }
  .acct-name { font-weight: 650; }
  .svc { font-size: 12px; color: var(--muted); }
  td.num { font-variant-numeric: tabular-nums; font-weight: 650; }

  .toolbar { display: flex; gap: 10px; align-items: center; margin: 22px 0 14px; flex-wrap: wrap; }
  .toolbar input[type="search"] {
    flex: 1; min-width: 200px; padding: 9px 13px; font: inherit; font-size: 13.5px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--card);
  }
  .toolbar input[type="search"]:focus { outline: none; border-color: #c9c6bd; }
  .btn {
    appearance: none; cursor: pointer; font: inherit; font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--ink); transition: background .12s;
  }
  .btn:hover { background: var(--gray-b); }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.primary:hover { background: #33322d; }

  /* Account header */
  .acct-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 8px; }
  .scorebox { text-align: right; flex-shrink: 0; }
  .scorebox .big { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
  .scorebox .cap { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .tierbar { display: flex; gap: 10px; margin: 18px 0 26px; flex-wrap: wrap; }
  .tier {
    flex: 1; min-width: 180px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
  }
  .tier .k { display: flex; justify-content: space-between; font-size: 12px; font-weight: 650; color: var(--muted); }
  .tier .k b { color: var(--ink); font-variant-numeric: tabular-nums; }
  .tier .track { height: 6px; background: var(--gray-b); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .tier .fill { height: 100%; border-radius: 3px; }

  /* CMT data strips inside sections */
  .dstrip {
    display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap;
    background: #fbfbf9; border: 1px solid var(--border-soft); border-radius: 8px;
    padding: 12px 16px; margin: 12px 0 4px;
  }
  .dstrip .dk { font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--faint); }
  .dstrip .dv { font-size: 17px; font-weight: 750; font-variant-numeric: tabular-nums; margin-top: 1px; }
  .dstrip .dn { font-size: 11.5px; color: var(--muted); }
  .dstrip .dsrc { margin-left: auto; align-self: center; font-size: 10.5px; color: var(--faint); letter-spacing: .03em; }

  .spark { display: flex; gap: 2px; align-items: flex-end; height: 38px; margin-top: 5px; }
  .spark .sb { width: 9px; background: #cbd5f0; border-radius: 2px 2px 0 0; }
  .spark .sb:last-child { background: var(--accent); }
  table.mini { border-collapse: collapse; margin-top: 5px; }
  table.mini th { font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--faint); padding: 2px 9px 2px 0; text-align: right; }
  table.mini td { font-size: 12px; padding: 2px 9px 2px 0; text-align: right; border-top: 1px solid var(--border-soft); font-variant-numeric: tabular-nums; }
  table.mini th:first-child, table.mini td:first-child { text-align: left; }
  table.mini td.bad { color: var(--red-t); font-weight: 650; }
  .tag.auto { background: #eef3fd; border-color: #c9d8f6; color: #3b5fb8; }
  .autoline { font-size: 11.5px; color: var(--faint); margin-top: 3px; }
  .autoline.live { color: #3b5fb8; }

  .savebar {
    position: sticky; bottom: 18px; display: flex; justify-content: center; pointer-events: none; margin-top: 8px;
  }
  .savebar .chip {
    pointer-events: auto; display: none; align-items: center; gap: 8px;
    background: var(--ink); color: #fff; font-size: 12.5px; font-weight: 600;
    border-radius: 999px; padding: 8px 16px; box-shadow: 0 6px 20px rgba(0,0,0,.18);
  }
  .savebar .chip.show { display: inline-flex; }

  .history { display: flex; gap: 4px; align-items: flex-end; margin-top: 6px; }
  .history .bar { width: 14px; border-radius: 3px 3px 0 0; background: var(--gray-br); }
  .hint { font-size: 12px; color: var(--faint); margin-top: 8px; }

  .footer { margin-top: 36px; font-size: 12px; color: var(--faint); border-top: 1px solid var(--border); padding-top: 14px; }

  .backlink { font-size: 13px; font-weight: 600; }
  .assessor { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); }
  .assessor input {
    font: inherit; font-size: 12.5px; padding: 5px 9px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); width: 150px;
  }
  .assessor input:focus { outline: none; border-color: #c9c6bd; }

  @media (max-width: 720px) {
    .brow { flex-direction: column; align-items: flex-start; gap: 8px; }
    .acct-head { flex-direction: column; }
    .scorebox { text-align: left; }
  }
</style>
</head>
<body>
  <div class="wrap" id="app"></div>

<script>
/* ================= Framework: behaviors embedded per section ================= */
const SECTIONS = [
  {
    id: 'relationship',
    title: 'Client Relationship',
    sub: 'Sentiment, sponsorship & decision-making',
    behaviors: [
      { id: 'sentiment',  tier: 'delight', owner: 'GS',  label: 'Client sentiment positive & engaged',
        healthy: 'Positive language, proactive asks, willing to refer', warning: 'Neutral / transactional tone', critical: 'Complaints, churn threats, or radio silence' },
      { id: 'multithread', tier: 'delight', owner: 'GS', label: 'Multi-threaded sponsorship',
        healthy: '≥3 active relationships beyond primary sponsor', warning: '2 relationships, 1 active', critical: 'Single-threaded or key contact disengaging' },
      { id: 'velocity',   tier: 'delight', owner: 'GS',  label: 'Decision velocity',
        healthy: 'Client decides within 1 week of recommendation', warning: '1–2 week turnaround, repeated re-asks', critical: '>2 weeks or multiple escalations needed' },
      { id: 'roi',        tier: 'delight', owner: 'GS',  label: 'Test ROI & business impact clear to client',
        healthy: 'Client sees $ impact tied to our work', warning: 'Impact estimated but not validated', critical: 'No clear business case articulated' },
      { id: 'risk24',     tier: 'hygiene', owner: 'GS',  label: 'Risks logged & escalated within 24h',
        healthy: 'New risks logged same-day with root-cause hypothesis', warning: 'Risk logged late (>24h)', critical: 'Risks not logged or not escalated' }
    ]
  },
  {
    id: 'meetings',
    title: 'Meetings & Cadence',
    sub: 'Touchpoints, syncs & communication rhythm',
    behaviors: [
      { id: 'touchpoint', tier: 'hygiene', owner: 'GS',  label: 'Weekly strategic client touchpoint',
        healthy: 'Call, meeting, or async with a clear POV every week', warning: '2-week gap or unclear agenda', critical: '>2 weeks with no documented interaction' },
      { id: 'teamsync',   tier: 'hygiene', owner: 'Both', label: 'Weekly GS + CST account-team sync',
        healthy: 'Weekly sync with decisions & action owners recorded', warning: 'Bi-weekly or notes unclear', critical: '>2 weeks or no sync record' },
      { id: 'agendas',    tier: 'hygiene', owner: 'GS',  label: 'Meeting hygiene: agendas & recaps',
        healthy: 'Agendas 24h ahead; recaps <24h with decisions & next steps', warning: 'Agendas late or recaps missing elements', critical: 'No agenda or no recap' },
      { id: 'proactive',  tier: 'hygiene', owner: 'CST', label: 'Proactive client updates 2×/week',
        healthy: 'Status + decisions pushed proactively twice a week', warning: 'Updates 1×/week or reactive only', critical: 'Radio silence >1 week' }
    ]
  },
  {
    id: 'deliverables',
    title: 'Deliverables & Testing',
    sub: 'Velocity, results & delivery discipline',
    behaviors: [
      { id: 'testvel',    tier: 'hygiene', owner: 'GS',  label: 'Test launch velocity',
        healthy: '≥1 test launched per 2 weeks', warning: '2–4 week gap between launches', critical: '>4 weeks with no queued tests' },
      { id: 'results',    tier: 'hygiene', owner: 'GS',  label: 'Results documented & framed for the business',
        healthy: 'Analyzed ≤3 days, business impact articulated', warning: 'Analysis delayed or framing unclear', critical: 'Results >1 week late or no summary' },
      { id: 'roadmap',    tier: 'hygiene', owner: 'GS',  label: 'Roadmap current & goal-aligned',
        healthy: 'Updated ≤30 days, reflects client business goals', warning: '30–60 days stale or weak alignment', critical: '>60 days stale or no roadmap' },
      { id: 'milestones', tier: 'hygiene', owner: 'CST', label: 'Delivery milestones on-time',
        healthy: 'All milestones hit on-time or early', warning: '1–2 slips with a recovery plan', critical: '>2 slips or no recovery plan' },
      { id: 'scope',      tier: 'hygiene', owner: 'CST', label: 'Scope change control',
        healthy: 'Changes logged, impact assessed, client approved', warning: 'Minor undocumented creep (<5h)', critical: 'Untracked scope creep (>10h)' },
      { id: 'blockers',   tier: 'hygiene', owner: 'CST', label: 'No critical-path blockers',
        healthy: 'Dependencies identified, nothing stalled', warning: '1–2 dependencies causing short delays', critical: 'Blockers causing >1 week of delay' }
    ]
  },
  {
    id: 'financials',
    title: 'Financials & Contract',
    sub: 'Retention, forecast, renewal & billing — CMT',
    behaviors: [
      { id: 'retention',  tier: 'foundation', owner: 'Both', label: 'Revenue retention',
        healthy: '≥90% trailing 12 months', warning: '85–89%', critical: '<85%' },
      { id: 'variance',   tier: 'foundation', owner: 'CST',  label: 'Forecast variance (burn vs. plan)',
        healthy: '<10% variance', warning: '10–20%', critical: '>20%' },
      { id: 'renewal',    tier: 'foundation', owner: 'Both', label: 'Renewal owned with a plan',
        healthy: 'Named owner + plan if ≤90 days out', warning: 'No plan <60 days from renewal', critical: 'No plan <30 days or past renewal' },
      { id: 'invoices',   tier: 'foundation', owner: 'CST',  label: 'Invoices paid on-time',
        healthy: 'On-time or early', warning: '0–15 days late', critical: '>15 days late' },
      { id: 'expansion',  tier: 'delight',    owner: 'GS',   label: 'Expansion motion alive',
        healthy: 'NRR ≥100% or ≥1 expansion opportunity logged this quarter', warning: 'Flat, nothing logged this quarter', critical: 'Contraction >5% or client declined new services' }
    ]
  },
  {
    id: 'team',
    title: 'Team & Capacity',
    sub: 'Utilization, timesheets & headroom — Harvest via CMT',
    behaviors: [
      { id: 'utilization', tier: 'foundation', owner: 'CST', label: 'Utilization vs. contracted hours',
        healthy: '90–110% of contract', warning: '70–89% or 111–120%', critical: '<70% or >130%' },
      { id: 'timesheets',  tier: 'foundation', owner: 'CST', label: 'Timesheet integrity',
        healthy: '≥95% same-day logging', warning: '80–94%', critical: '<80%' },
      { id: 'capacity',    tier: 'hygiene',    owner: 'CST', label: 'Team capacity headroom',
        healthy: '<85% allocated across the team', warning: '85–95% allocated', critical: '>95% or members overallocated' }
    ]
  }
];

const ALL_BEHAVIORS = SECTIONS.flatMap(s => s.behaviors.map(b => ({ ...b, section: s.id })));
const TIER_WEIGHTS = { foundation: 30, hygiene: 35, delight: 25 }; // per scorecard framework
const VAL = { healthy: 1, warning: 0.5, critical: 0 };

/* ================= Scoring =================
   A behavior's effective status = manual selection if set, otherwise the
   auto status computed from CMT / Iris / Jira data at build time. */
function effVal(values, auto, b) {
  if (values && values[b.id]) return values[b.id];
  if (auto && auto[b.id]) return auto[b.id].v;
  return null;
}

function scoreAccount(values, auto) {
  values = values || {}; auto = auto || {};
  const tiers = {};
  for (const t of Object.keys(TIER_WEIGHTS)) {
    const list = ALL_BEHAVIORS.filter(b => b.tier === t);
    const sum = list.reduce((acc, b) => { const v = effVal(values, auto, b); return acc + (v ? VAL[v] : 0); }, 0);
    tiers[t] = list.length ? sum / list.length : 0;
  }
  const wsum = Object.keys(TIER_WEIGHTS).reduce((a, t) => a + TIER_WEIGHTS[t] * tiers[t], 0);
  const wmax = Object.values(TIER_WEIGHTS).reduce((a, b) => a + b, 0);
  const pct = Math.round((wsum / wmax) * 100);
  const assessed = ALL_BEHAVIORS.filter(b => effVal(values, auto, b)).length;
  let band = 'NONE';
  if (assessed > 0) {
    band = pct >= 85 ? 'GREEN' : pct >= 65 ? 'YELLOW' : pct >= 45 ? 'ORANGE' : 'RED';
  }
  return { pct, band, tiers, assessed, total: ALL_BEHAVIORS.length };
}

function sectionStatus(section, values, auto) {
  values = values || {}; auto = auto || {};
  const assessed = section.behaviors.filter(b => effVal(values, auto, b)).length;
  if (assessed === 0) return { band: 'NONE', label: 'Not assessed' };
  const avg = section.behaviors.reduce((a, b) => { const v = effVal(values, auto, b); return a + (v ? VAL[v] : 0); }, 0) / section.behaviors.length;
  const band = avg >= 0.85 ? 'GREEN' : avg >= 0.65 ? 'YELLOW' : avg >= 0.45 ? 'ORANGE' : 'RED';
  return { band, label: BAND_META[band].label };
}

const BAND_META = {
  GREEN:  { label: 'Healthy',      cls: 'green',  color: 'var(--green-t)' },
  YELLOW: { label: 'Monitor',      cls: 'yellow', color: 'var(--yellow-t)' },
  ORANGE: { label: 'Intervene',    cls: 'orange', color: 'var(--orange-t)' },
  RED:    { label: 'Crisis',       cls: 'red',    color: 'var(--red-t)' },
  NONE:   { label: 'Not assessed', cls: '',       color: 'var(--gray-t)' }
};

const ESCALATION = {
  GREEN:  'Routine weekly monitoring. Keep documenting wins and hunting expansion.',
  YELLOW: 'Diagnostic call within 48h. Identify root cause (GS-driven, CST-driven, external). GS Director aware.',
  ORANGE: 'Intervention: GS + CST joint sync same-day, VP Client Strategy engaged, concrete reset proposed to client within 5 business days.',
  RED:    'Crisis: escalate to VP Client Strategy same-day. All-hands call within 24h. Retention decision within 48h.',
  NONE:   'Complete the assessment below to generate a health status.'
};

/* ================= State & API ================= */
// Seed accounts (active accounts from CMT) — used when no server is available,
// e.g. the file was opened directly by double-clicking. On Railway, the server copy is used.
const SEED = [
  ["938","Action Against Hunger - CRO","CRO","Good"],["841","Action Against Hunger (Lifecycle)","Lifecycle","Good"],
  ["1097","Ageless Rx - CRO","CRO","Good"],["655","AIAA","CRO, Lifecycle, D+B, Analytics","Good"],
  ["1176","AIAA - E-Commerce and CRM Integration","D+B","Good"],["1178","Align Optimizely Pilot","CRO","Good"],
  ["819","Apple - CRO Strategy","D+B","At Risk"],["979","Apple CRO Strategy - Full Time Resources","CRO","At Risk"],
  ["755","Ariat - CRO","CRO","Neutral"],["141","ASCAP","CRO","At Risk"],["635","Aspenware","CRO","At Risk"],
  ["734","Asurion","CRO","Good"],["131","Blurb","CRO","Green"],["304","Bombas","CRO","At Risk"],
  ["260","Charles Schwab","CRO","Green"],["855","Charles Schwab Education & Insights","CRO","Green"],
  ["294","Cutco / Vector (Paid Spend)","Paid","New"],["116","Cutco / Vector","CRO","Green"],
  ["432","Dignity Memorial","D+B","Good"],["1164","Dignity Memorial - CJA","CJM","Good"],
  ["1115","Ducks - Ongoing Lifecycle/Consulting","Lifecycle","Green"],["1020","Enova International - CRO","CRO","Good"],
  ["922","Equifax","CRO, Analytics","Good"],["1171","Everytown Creative","Paid",""],
  ["1167","Everytown CRO + Lifecycle + Analytics","CRO, Analytics, Lifecycle","Green"],["1169","Everytown Paid","Paid","Green"],
  ["962","Everytown Web Dev","D+B","New"],["856","Friends of the Earth","Lifecycle, CRO","Neutral"],
  ["762","Gift of Hope - Analytics","Analytics","New"],["1121","Gift of Hope - Web Dev and Maint","D+B","New"],
  ["1151","Good Inside","CRO","At Risk"],["1002","Groundworks","CJM, CRO","Good"],["836","Gusto - CRO","CRO","Good"],

const LOCAL_KEY = 'ahm_local_data';
let DATA = { accounts: [], assessments: {} };
let LOCAL_MODE = false;
let saveTimer = null;

async function loadData() {
  if (location.protocol !== 'file:') {
    try {
      const r = await fetch('/api/data');
      if (r.ok) { DATA = await r.json(); return; }
    } catch (e) { /* fall through to local mode */ }
  }
  // No server available → local mode: data lives in this browser
  LOCAL_MODE = true;
  try { DATA = JSON.parse(localStorage.getItem(LOCAL_KEY)); } catch (e) { DATA = null; }
  if (!DATA || !Array.isArray(DATA.accounts) || !DATA.accounts.length) {
    DATA = { accounts: SEED, assessments: {} };
  }
}

function queueSave(accountId) {
  clearTimeout(saveTimer);
  showChip('Saving…');
  saveTimer = setTimeout(async () => {
    const a = DATA.assessments[accountId] || {};
    const s = scoreAccount(a.values, autoFor(accountId));

    if (LOCAL_MODE) {
      // Snapshot: upsert one entry per day (mirrors server logic)
      a.updatedAt = new Date().toISOString();
      const today = a.updatedAt.slice(0, 10);
      a.history = (a.history || []).filter(h => h.date !== today);
      a.history.push({ date: today, score: s.pct, band: s.band });
      a.history.sort((x, y) => x.date.localeCompare(y.date));
      DATA.assessments[accountId] = a;
      try {
        localStorage.setItem(LOCAL_KEY, JSON.stringify(DATA));
        showChip('Saved — this browser only', true);
      } catch (e) { showChip('Save failed', true); }
      return;
    }

    try {
      await fetch('/api/assessment', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accountId, values: a.values || {}, notes: a.notes || {}, assessedBy: a.assessedBy || '', score: s.pct, band: s.band })
      });
      showChip('Saved', true);
    } catch (e) { showChip('Save failed — check connection', true); }
  }, 600);
}

function showChip(text, fade) {
  const chip = document.getElementById('savechip');
  if (!chip) return;
  chip.textContent = text;
  chip.classList.add('show');
  if (fade) setTimeout(() => chip.classList.remove('show'), 1600);
}

const app = document.getElementById('app');

function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

function pill(band, lg) {
  const m = BAND_META[band] || BAND_META.NONE;
  return `<span class="pill ${m.cls} ${lg ? 'lg' : ''}"><span class="dot"></span>${m.label}</span>`;
}

/* ---- CMT data display helpers ---- */
function fmtMoney(n) { return (n == null) ? null : '$' + Math.round(n).toLocaleString(); }
function fmtDate(d) {
  if (!d) return null;
  const dt = new Date(d + 'T00:00:00');
  return isNaN(dt) ? d : dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function cmtFor(accountId) { return (CMT_DATA.accounts || {})[String(accountId)] || {}; }
function autoFor(accountId) { return cmtFor(accountId).auto || {}; }
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

function dataStrip(items, src, extra) {
  const li = items.filter(i => i[1] != null && i[1] !== '');
  if (!li.length && !extra) return '';
  return `<div class="dstrip">${li.map(([k, v, n]) =>
    `<div class="d"><div class="dk">${k}</div><div class="dv">${esc(v)}</div>${n ? `<div class="dn">${esc(n)}</div>` : ''}</div>`).join('')}
    ${extra || ''}
    <div class="dsrc">${esc(src || 'CMT')}${CMT_DATA.asOf ? ' · ' + CMT_DATA.asOf : ''}</div></div>`;
}

function spark(trend, label) {
  if (!trend || trend.length < 2) return '';
  const max = Math.max(...trend.map(p => p.v || 0));
  if (max <= 0) return '';
  return `<div class="d"><div class="dk">${label} (${trend.length} mo)</div>
    <div class="spark">${trend.map(p => `<div class="sb" title="${p.m}: ${fmtMoney(p.v)}" style="height:${Math.max(4, Math.round((p.v || 0) / max * 34))}px"></div>`).join('')}</div></div>`;
}

function hoursTable(trend) {
  if (!trend || !trend.length) return '';
  return `<div class="d"><div class="dk">Planned vs actual (over/under)</div><table class="mini"><thead><tr><th>Month</th><th>Plan</th><th>Actual</th><th>±</th></tr></thead><tbody>
    ${trend.slice(-5).map(r => {
      const isMTD = r.m === (CMT_DATA.asOf || '').slice(0, 7);
      const d = (r.planned && r.actual != null && !isMTD) ? Math.round((r.actual - r.planned) / r.planned * 100) : null;
      return `<tr><td>${r.m}${isMTD ? '*' : ''}</td><td>${r.planned != null ? Math.round(r.planned) : '—'}</td><td>${r.actual != null ? Math.round(r.actual) : '—'}</td><td class="${d > 20 || d < -30 ? 'bad' : ''}">${d == null ? '—' : (d > 0 ? '+' : '') + d + '%'}</td></tr>`;
    }).join('')}</tbody></table><div class="dn">* month to date</div></div>`;
}

function sectionStrip(secId, accountId) {
  const cd = cmtFor(accountId);
  if (secId === 'financials') return dataStrip([
    ['MRR (current mo)', fmtMoney(cd.mrr), cd.mrrNote],
    ['Renewal', fmtDate(cd.renewalDate), cd.renewalStatus]
  ], 'CMT', spark(cd.mrrTrend, 'MRR trend'));
  if (secId === 'team') return dataStrip([
    ['Pacing (Jul)', cd.pacingPct != null ? cd.pacingPct + '%' : null, cd.pacingPct != null ? (cd.pacingPct > 120 ? 'hot' : cd.pacingPct < 70 ? 'cold' : 'on plan') : null]
  ], 'Harvest via CMT', hoursTable(cd.hoursTrend));
  if (secId === 'deliverables') {
    const dv = cd.deliverables;
    if (!dv) return '';
    return dataStrip([
      ['Launched (30d)', dv.launched30d != null ? String(dv.launched30d) : null, (dv.launched14d || 0) + ' in last 14d'],
      ['In progress', dv.inProgress != null ? String(dv.inProgress) : null],
      ['Backlog', dv.backlog != null ? String(dv.backlog) : null],
      ['Overdue (Jira)', dv.overdue != null ? String(dv.overdue) : null, 'incl. legacy issues']
    ], dv.source || 'Iris / Jira');
  }
  return '';
}

function renderPortfolio() {
  const q = (window._search || '').toLowerCase();
  const rows = DATA.accounts
    .map(acc => ({ acc, s: scoreAccount((DATA.assessments[acc.id] || {}).values, autoFor(acc.id)) }))
    .filter(({ acc }) => !q || acc.name.toLowerCase().includes(q))
    .sort((a, b) => {
      const rank = { RED: 0, ORANGE: 1, YELLOW: 2, NONE: 3, GREEN: 4 };
      return (rank[a.s.band] - rank[b.s.band]) || (a.s.pct - b.s.pct) || a.acc.name.localeCompare(b.acc.name);
    });

  const counts = { GREEN: 0, YELLOW: 0, ORANGE: 0, RED: 0, NONE: 0 };
  let scoreSum = 0, scoreN = 0;
  DATA.accounts.forEach(acc => {
    const sc = scoreAccount((DATA.assessments[acc.id] || {}).values, autoFor(acc.id));
    counts[sc.band]++;
    if (sc.band !== 'NONE') { scoreSum += sc.pct; scoreN++; }
  });
  const avgScore = scoreN ? Math.round(scoreSum / scoreN) : null;

  // Portfolio rollups from CMT data
  const curM = (CMT_DATA.asOf || '').slice(0, 7);
  const byMonth = {};
  let totalMrr = 0, planCur = 0, actCur = 0;
  DATA.accounts.forEach(acc => {
    const cd = cmtFor(acc.id);
    totalMrr += cd.mrr || 0;
    (cd.mrrTrend || []).forEach(p => { byMonth[p.m] = (byMonth[p.m] || 0) + (p.v || 0); });
    const h = (cd.hoursTrend || []).find(x => x.m === curM);
    if (h) { planCur += h.planned || 0; actCur += h.actual || 0; }
  });
  const pTrend = Object.keys(byMonth).sort().map(m => ({ m, v: byMonth[m] }));
  const prev = pTrend.length >= 2 ? pTrend[pTrend.length - 2] : null;
  const mrrDelta = (prev && prev.v) ? Math.round((byMonth[curM] - prev.v) / prev.v * 100) : null;
  const asOfDate = CMT_DATA.asOf ? new Date(CMT_DATA.asOf + 'T00:00:00') : null;
  const dim = asOfDate ? new Date(asOfDate.getFullYear(), asOfDate.getMonth() + 1, 0).getDate() : 30;
  const expected = planCur * (asOfDate ? asOfDate.getDate() : 1) / dim;
  const pace = expected > 0 ? Math.round(actCur / expected * 100) : null;
  const maxV = Math.max(...pTrend.map(p => p.v || 0), 1);
  const pSpark = pTrend.length >= 2
    ? `<div class="spark" style="margin-top:10px">${pTrend.map(p => `<div class="sb" title="${p.m}: ${fmtMoney(p.v)}" style="height:${Math.max(4, Math.round((p.v || 0) / maxV * 34))}px"></div>`).join('')}</div>`
    : '';

  app.innerHTML = `
    <div class="eyebrow"><span>Account Health · Cro Metrics</span><span class="right">${LOCAL_MODE ? 'Local mode — saved in this browser only' : 'Growth Strategy × Client Services'}</span></div>
    <h1 class="title">Portfolio</h1>
    <p class="meta">${DATA.accounts.length} active accounts from CMT · behaviors scored across Foundation ${TIER_WEIGHTS.foundation}% / Consulting Hygiene ${TIER_WEIGHTS.hygiene}% / Delight ${TIER_WEIGHTS.delight}%</p>

    <div class="metrics">
      <div class="metric"><div class="k">Total MRR (current mo)</div><div class="v">${fmtMoney(totalMrr) || '—'}</div><div class="s">${mrrDelta == null ? 'across portfolio' : (mrrDelta >= 0 ? '+' : '') + mrrDelta + '% vs prior month'}</div></div>
      <div class="metric"><div class="k">Portfolio MRR trend</div>${pSpark || '<div class="v">—</div>'}</div>
      <div class="metric"><div class="k">Planned hrs (mo)</div><div class="v">${Math.round(planCur).toLocaleString()}h</div><div class="s">Harvest via CMT</div></div>
      <div class="metric"><div class="k">Actual hrs (MTD)</div><div class="v">${Math.round(actCur).toLocaleString()}h</div><div class="s">${pace == null ? '' : pace + '% of expected pace' + (pace > 115 ? ' — hot' : pace < 85 ? ' — under' : '')}</div></div>
      <div class="metric"><div class="k">Avg health</div><div class="v">${avgScore ?? '—'}</div><div class="s">of 100 · ${scoreN} accounts scored</div></div>
    </div>
    <div class="metrics" style="margin-top:-10px">
      <div class="metric"><div class="k">Healthy</div><div class="v" style="color:var(--green-t)">${counts.GREEN}</div></div>
      <div class="metric"><div class="k">Monitor</div><div class="v" style="color:var(--yellow-t)">${counts.YELLOW}</div></div>
      <div class="metric"><div class="k">Intervene</div><div class="v" style="color:var(--orange-t)">${counts.ORANGE}</div></div>
      <div class="metric"><div class="k">Crisis</div><div class="v" style="color:var(--red-t)">${counts.RED}</div></div>
      <div class="metric"><div class="k">Not assessed</div><div class="v" style="color:var(--gray-t)">${counts.NONE}</div></div>
    </div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Filter accounts…" value="${esc(window._search || '')}">
      <button class="btn" id="exportBtn">Export weekly report</button>
    </div>

    <div class="table-card">
    <table class="roster">
      <thead><tr><th>Account</th><th>Service lines</th><th>MRR</th><th>Hrs (plan / MTD)</th><th>Assessed</th><th>Score</th><th>Status</th></tr></thead>
      <tbody>
        ${rows.map(({ acc, s }) => `
          <tr data-id="${esc(acc.id)}">
            <td><div class="acct-name">${esc(acc.name)}</div></td>

  `;

  document.querySelectorAll('tbody tr').forEach(tr =>

  const bandMeta = BAND_META[s.band];
  const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const tierRow = (key, name) => {
    const p = Math.round(s.tiers[key] * 100);

  };

  const histHtml = hist.length ? `
    <div class="history">${hist.map(h => {
      const m = BAND_META[h.band] || BAND_META.NONE;
      return `<div class="bar" title="${h.date}: ${h.score} (${m.label})" style="height:${Math.max(6, h.score * 0.5)}px;background:${m.color}"></div>`;
    }).join('')}</div>
    <div class="hint">Weekly snapshots — one saved per day on change (last ${hist.length})</div>` : '';

  app.innerHTML = `
    <div class="eyebrow"><a href="#/" class="backlink">← Portfolio</a><span class="right">Snapshot as of <b>${today}</b>${LOCAL_MODE ? ' · local mode' : ''}</span></div>

    <div class="acct-head">
      <div>
        <h1 class="title">${esc(acc.name)}</h1>
        <p class="meta">CMT <code>#${esc(acc.id)}</code>${acc.serviceLines ? ' · ' + esc(acc.serviceLines) : ''}${acc.cmtHealth ? ' · CMT health: ' + esc(acc.cmtHealth) : ''}</p>
        <p class="meta" style="margin-top:10px">${pill(s.band, true)}${(acc.pulseUrl || PULSE_URLS[acc.id]) ? ` <a class="btn" style="margin-left:10px;padding:5px 12px;font-size:12px" href="${esc(acc.pulseUrl || PULSE_URLS[acc.id])}" target="_blank" rel="noopener">Account Pulse ↗</a>` : ''}</p>
      </div>
      <div class="scorebox">
        <div class="big" style="color:${bandMeta.color}">${s.band === 'NONE' ? '—' : s.pct}</div>
        <div class="cap">of 100 · ${s.assessed}/${s.total} signals assessed</div>
        <div class="cap assessor" style="margin-top:8px">Assessed by <input id="assessor" placeholder="name" value="${esc(A.assessedBy || '')}"></div>
      </div>
    </div>

    <div class="tierbar">
      ${tierRow('foundation', 'Foundation')}
      ${tierRow('hygiene', 'Consulting Hygiene')}
      ${tierRow('delight', 'Delight')}
    </div>

    <div class="section" style="border-left:3px solid ${bandMeta.color}">
      <div class="section-body" style="padding:14px 22px">
        <b style="font-size:13px">Play to run:</b> <span style="font-size:13px;color:var(--muted)">${ESCALATION[s.band]}</span>
      </div>
    </div>

    ${SECTIONS.map(sec => {
      const st = sectionStatus(sec, A.values, autoFor(acc.id));
      return `
      <div class="section">
        <div class="section-head">
          <div><h2>${sec.title}</h2><div class="sub">${sec.sub}</div></div>
          ${pill(st.band)}
        </div>
        <div class="section-body">
          ${sectionStrip(sec.id, acc.id)}
          ${sec.behaviors.map(b => {
            const manual = A.values[b.id] || '';
            const auto = autoFor(acc.id)[b.id];
            const v = manual || (auto ? auto.v : '');
            const autoLine = auto
              ? `<div class="autoline ${manual ? '' : 'live'}">${manual ? `Manual override (auto: ${cap(auto.v)} — click your selection to revert)` : `Auto from data`} · ${esc(auto.note)}</div>`
              : '';
            return `
            <div class="brow">
              <div class="info">
                <div class="label">${b.label}<span class="tags"><span class="tag">${b.tier}</span><span class="tag">${b.owner}</span>${auto ? '<span class="tag auto">auto</span>' : ''}</span></div>
                <div class="crit" title="Warning: ${esc(b.warning)} · Critical: ${esc(b.critical)}">Healthy: ${b.healthy}</div>
                ${autoLine}
              </div>
              <div class="seg" data-behavior="${b.id}">
                <button data-v="healthy"  class="${v === 'healthy' ? 'on-healthy' : ''}">Healthy</button>
                <button data-v="warning"  class="${v === 'warning' ? 'on-warning' : ''}">Warning</button>
                <button data-v="critical" class="${v === 'critical' ? 'on-critical' : ''}">Critical</button>
              </div>
            </div>`;
          }).join('')}
          <textarea class="notes" data-section="${sec.id}" placeholder="Notes & root cause for this section (required if Warning/Critical)…">${esc(A.notes[sec.id] || '')}</textarea>
        </div>
      </div>`;
    }).join('')}

    ${histHtml}

    <div class="savebar"><span class="chip" id="savechip">Saved</span></div>
    <div class="footer">Signals map to the GS scorecard: Foundation (table stakes) · Consulting Hygiene (weekly rhythms, GS + CST) · Delighting the Customer (growth & advocacy). Signals tagged <b>auto</b> are scored from CMT / Iris / Jira data as of the snapshot date; click a different value to override, click your selection again to revert to auto. Warning/Critical selections should have a root cause noted. ${LOCAL_MODE ? 'Changes auto-save in this browser — deploy to Railway for team-shared data.' : 'Changes auto-save for the whole team.'}</div>
  `;

  // Wire up segmented controls
  document.querySelectorAll('.seg').forEach(seg => {
    seg.addEventListener('click', (e) => {
      const btn = e.target.closest('button'); if (!btn) return;
      const bid = seg.dataset.behavior;
      const v = btn.dataset.v;
      if (A.values[bid] === v) delete A.values[bid]; else A.values[bid] = v;
      queueSave(acc.id);
      renderAccount(acc.id);
      window.scrollTo(0, window._scrollY || 0);
    });
  });
  document.querySelectorAll('.seg').forEach(seg => seg.addEventListener('mousedown', () => { window._scrollY = window.scrollY; }));

  document.querySelectorAll('textarea.notes').forEach(t => {
    t.addEventListener('input', () => { A.notes[t.dataset.section] = t.value; queueSave(acc.id); });
  });
  document.getElementById('assessor').addEventListener('input', (e) => { A.assessedBy = e.target.value; queueSave(acc.id); });
}

/* ================= Weekly report export ================= */
function exportReport() {
  const date = new Date().toISOString().slice(0, 10);
  const rows = DATA.accounts
    .map(acc => ({ acc, a: DATA.assessments[acc.id] || {}, s: scoreAccount((DATA.assessments[acc.id] || {}).values, autoFor(acc.id)) }))
    .sort((x, y) => x.s.pct - y.s.pct);

  let md = `# Account Health — Weekly Report\n**Generated:** ${date}\n\n`;
  md += `| Status | Count |\n|---|---|\n`;
  const counts = { GREEN: 0, YELLOW: 0, ORANGE: 0, RED: 0, NONE: 0 };
  rows.forEach(r => counts[r.s.band]++);
  md += `| 🟢 Healthy | ${counts.GREEN} |\n| 🟡 Monitor | ${counts.YELLOW} |\n| 🟠 Intervene | ${counts.ORANGE} |\n| 🔴 Crisis | ${counts.RED} |\n| ⚪ Not assessed | ${counts.NONE} |\n\n---\n\n`;

  for (const { acc, a, s } of rows) {
    if (s.band === 'NONE') continue;
    const flag = { GREEN: '🟢', YELLOW: '🟡', ORANGE: '🟠', RED: '🔴' }[s.band];
    md += `## ${flag} ${acc.name} — ${s.pct}/100 (${BAND_META[s.band].label})\n`;
    md += `Foundation ${Math.round(s.tiers.foundation * 100)} · Hygiene ${Math.round(s.tiers.hygiene * 100)} · Delight ${Math.round(s.tiers.delight * 100)} · ${s.assessed}/${s.total} assessed${a.assessedBy ? ' · by ' + a.assessedBy : ''}\n\n`;
    const bad = ALL_BEHAVIORS.filter(b => effVal(a.values, autoFor(acc.id), b) === 'critical');
    const warn = ALL_BEHAVIORS.filter(b => effVal(a.values, autoFor(acc.id), b) === 'warning');
    if (bad.length) md += `**Critical:** ${bad.map(b => b.label).join('; ')}\n\n`;
    if (warn.length) md += `**Warning:** ${warn.map(b => b.label).join('; ')}\n\n`;
    const notes = Object.entries(a.notes || {}).filter(([, v]) => v && v.trim());
    if (notes.length) md += notes.map(([k, v]) => `**Notes (${k}):** ${v.trim()}`).join('\n\n') + '\n\n';
  }
  md += `\n*Unassessed accounts (${counts.NONE}) omitted. Generated from the Account Health Monitor.*\n`;

  const blob = new Blob([md], { type: 'text/markdown' });
  const aEl = document.createElement('a');
  aEl.href = URL.createObjectURL(blob);
  aEl.download = `account-health-report-${date}.md`;
  aEl.click();
}

/* ================= Router ================= */
async function route() {
  const m = location.hash.match(/^#\/account\/(.+)$/);
  if (m) renderAccount(decodeURIComponent(m[1]));
  else renderPortfolio();
}

window.addEventListener('hashchange', route);
loadData().then(route);
</script>

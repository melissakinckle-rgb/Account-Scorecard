<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account Health · Cro Metrics</title>
<style>
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --border: #e6e4df;
    --border-soft: #efede8;
    --ink: #1c1b18;
    --muted: #75726b;
    --faint: #a3a099;
    --accent: #1a56db;
    --green-t: #1a7f43; --green-b: #e9f6ee; --green-br: #cdeadb;
    --yellow-t: #96700a; --yellow-b: #fbf3dc; --yellow-br: #eede9f;
    --orange-t: #b4530a; --orange-b: #fdeee1; --orange-br: #f5d5b8;
    --red-t: #b42318; --red-b: #fdebe9; --red-br: #f5c6c0;
    --gray-t: #6b6b66; --gray-b: #f0efec; --gray-br: #dddbd4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 14px; line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .wrap { max-width: 1020px; margin: 0 auto; padding: 40px 28px 80px; }

  .eyebrow {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; color: var(--muted); letter-spacing: .02em;
    padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }
  .eyebrow .right { color: var(--faint); }

  h1.title { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; }
  .meta { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .meta code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
    background: var(--gray-b); border: 1px solid var(--border-soft); border-radius: 4px; padding: 0 5px;
  }

  /* Pills */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: .01em;
    border-radius: 999px; padding: 3px 11px; border: 1px solid var(--gray-br);
    background: var(--gray-b); color: var(--gray-t); white-space: nowrap;
  }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .pill.green  { background: var(--green-b);  color: var(--green-t);  border-color: var(--green-br); }
  .pill.yellow { background: var(--yellow-b); color: var(--yellow-t); border-color: var(--yellow-br); }
  .pill.orange { background: var(--orange-b); color: var(--orange-t); border-color: var(--orange-br); }
  .pill.red    { background: var(--red-b);    color: var(--red-t);    border-color: var(--red-br); }
  .pill.lg { font-size: 14px; padding: 6px 16px; }

  /* Metric cards */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(158px, 1fr)); gap: 12px; margin: 22px 0; }
  .metric {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; min-height: 92px; display: flex; flex-direction: column;
  }
  .metric .k { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
  .metric .v { font-size: 23px; font-weight: 750; margin-top: 6px; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; line-height: 1.15; }
  .metric .v.sm { font-size: 15px; font-weight: 650; letter-spacing: 0; margin-top: 8px; }
  .metric .s { font-size: 11.5px; color: var(--muted); margin-top: auto; padding-top: 4px; line-height: 1.35; }

  /* Sections */
  .section {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 18px; overflow: hidden;
  }
  .section-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
    padding: 18px 22px 14px; border-bottom: 1px solid var(--border-soft);
  }
  .section-head h2 { font-size: 16px; font-weight: 750; letter-spacing: -0.01em; }
  .section-head .sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .section-body { padding: 8px 22px 18px; }

  /* Behavior rows */
  .brow {
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
    padding: 13px 0; border-bottom: 1px solid var(--border-soft);
  }
  .brow:last-of-type { border-bottom: none; }
  .brow .info { flex: 1; min-width: 0; }
  .brow .label { font-weight: 600; font-size: 13.5px; }
  .brow .crit { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .tags { display: inline-flex; gap: 5px; margin-left: 8px; vertical-align: 1px; }
  .tag {
    font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    color: var(--faint); border: 1px solid var(--border); border-radius: 4px; padding: 0 5px;
    background: #fbfbf9;
  }
  .tag.auto { background: #eef3fd; border-color: #c9d8f6; color: #3b5fb8; }
  .autoline { font-size: 11.5px; color: var(--faint); margin-top: 3px; }
  .autoline.live { color: #3b5fb8; }

  /* Segmented control */
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; background: #fbfbf9; }
  .seg button {
    appearance: none; border: none; background: transparent; cursor: pointer;
    font: inherit; font-size: 12px; font-weight: 600; color: var(--faint);
    padding: 6px 12px; border-left: 1px solid var(--border-soft); transition: background .12s, color .12s;
  }
  .seg button:first-child { border-left: none; }
  .seg button:hover { color: var(--muted); background: var(--gray-b); }
  .seg button.on-healthy  { background: var(--green-b);  color: var(--green-t); }
  .seg button.on-warning  { background: var(--yellow-b); color: var(--yellow-t); }
  .seg button.on-critical { background: var(--red-b);    color: var(--red-t); }

  textarea.notes {
    width: 100%; margin-top: 12px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px; background: #fdfdfc;
    font: inherit; font-size: 13px; color: var(--ink); resize: vertical; min-height: 44px;
  }
  textarea.notes:focus { outline: none; border-color: #c9c6bd; }
  textarea.notes::placeholder { color: var(--faint); }

  /* Tables */
  table.roster { width: 100%; border-collapse: collapse; background: var(--card); }
  .table-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
  table.roster th {
    text-align: left; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); background: #fbfbf9; padding: 11px 16px; border-bottom: 1px solid var(--border);
  }
  table.roster td { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); font-size: 13.5px; vertical-align: middle; }
  table.roster tr:last-child td { border-bottom: none; }
  table.roster tbody tr { cursor: pointer; }
  table.roster tbody tr:hover { background: #fbfbf8; }
  .acct-name { font-weight: 650; }
  .svc { font-size: 12px; color: var(--muted); }
  td.num { font-variant-numeric: tabular-nums; font-weight: 650; }
  .flags { font-size: 12px; color: var(--red-t); }

  .group-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 750; letter-spacing: .01em;
    margin: 28px 0 10px; color: var(--ink);
  }
  .group-title .sub { font-weight: 500; color: var(--faint); font-size: 12px; }

  .toolbar { display: flex; gap: 10px; align-items: center; margin: 22px 0 4px; flex-wrap: wrap; }
  .toolbar input[type="search"] {
    flex: 1; min-width: 200px; padding: 9px 13px; font: inherit; font-size: 13.5px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--card);
  }
  .toolbar input[type="search"]:focus { outline: none; border-color: #c9c6bd; }
  .btn {
    appearance: none; cursor: pointer; font: inherit; font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--ink); transition: background .12s;
  }
  .btn:hover { background: var(--gray-b); }

  /* Account header */
  .acct-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 8px; }
  .scorebox { text-align: right; flex-shrink: 0; }
  .scorebox .cap { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .hazard {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--red-b); border: 1px solid var(--red-br); border-left: 4px solid var(--red-t);
    border-radius: 10px; padding: 14px 18px; margin: 16px 0 4px;
  }
  .hazard .icon { font-size: 20px; line-height: 1.2; }
  .hazard b { color: var(--red-t); }
  .hazard .txt { font-size: 13px; color: #7f1d1d; }

  .why {
    background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--orange-t);
    border-radius: 10px; padding: 16px 20px; margin: 14px 0 4px;
  }
  .why h3 { font-size: 13px; font-weight: 750; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; }
  .why .row { display: flex; gap: 10px; align-items: baseline; padding: 5px 0; font-size: 13px; }
  .why .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; position: relative; top: -1px; }
  .why .dot.critical { background: var(--red-t); }
  .why .dot.warning { background: var(--yellow-t); }
  .why .lbl { font-weight: 650; }
  .why .ev { color: var(--muted); }

  /* Tier summary */
  .tierbar { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin: 16px 0 22px; }
  .tier { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; }
  .tier .k { display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; font-weight: 700; }
  .tier .k .w { font-size: 10.5px; font-weight: 700; color: var(--faint); letter-spacing: .04em; }
  .tier .track { height: 6px; background: var(--gray-b); border-radius: 3px; margin-top: 9px; overflow: hidden; }
  .tier .fill { height: 100%; border-radius: 3px; }
  .tier .cnt { font-size: 11.5px; color: var(--muted); margin-top: 7px; }

  /* CMT data strips inside sections */
  .dstrip {
    display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap;
    background: #fbfbf9; border: 1px solid var(--border-soft); border-radius: 8px;
    padding: 12px 16px; margin: 12px 0 4px;
  }
  .dstrip .dk { font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--faint); }
  .dstrip .dv { font-size: 17px; font-weight: 750; font-variant-numeric: tabular-nums; margin-top: 1px; }
  .dstrip .dn { font-size: 11.5px; color: var(--muted); }
  .dstrip .dsrc { margin-left: auto; align-self: center; font-size: 10.5px; color: var(--faint); letter-spacing: .03em; }

  .spark { display: flex; gap: 2px; align-items: flex-end; height: 38px; margin-top: 5px; }
  .spark .sb { width: 9px; background: #cbd5f0; border-radius: 2px 2px 0 0; }
  .spark .sb:last-child { background: var(--accent); }
  table.mini { border-collapse: collapse; margin-top: 5px; }
  table.mini th { font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--faint); padding: 2px 10px 2px 0; text-align: right; }
  table.mini td { font-size: 12px; padding: 2px 10px 2px 0; text-align: right; border-top: 1px solid var(--border-soft); font-variant-numeric: tabular-nums; }
  table.mini th:first-child, table.mini td:first-child { text-align: left; }
  table.mini td.bad { color: var(--red-t); font-weight: 650; }
  table.mini td.low { color: var(--orange-t); font-weight: 650; }

  .savebar { position: sticky; bottom: 18px; display: flex; justify-content: center; pointer-events: none; margin-top: 8px; }
  .savebar .chip {
    pointer-events: auto; display: none; align-items: center; gap: 8px;
    background: var(--ink); color: #fff; font-size: 12.5px; font-weight: 600;
    border-radius: 999px; padding: 8px 16px; box-shadow: 0 6px 20px rgba(0,0,0,.18);
  }
  .savebar .chip.show { display: inline-flex; }

  .history { display: flex; gap: 4px; align-items: flex-end; margin-top: 6px; }
  .history .bar { width: 14px; height: 22px; border-radius: 3px; background: var(--gray-br); }
  .hint { font-size: 12px; color: var(--faint); margin-top: 8px; }

  .footer { margin-top: 36px; font-size: 12px; color: var(--faint); border-top: 1px solid var(--border); padding-top: 14px; }

  .backlink { font-size: 13px; font-weight: 600; }
  .assessor { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); }
  .assessor input {
    font: inherit; font-size: 12.5px; padding: 5px 9px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); width: 150px;
  }
  .assessor input:focus { outline: none; border-color: #c9c6bd; }

  @media (max-width: 720px) {
    .brow { flex-direction: column; align-items: flex-start; gap: 8px; }
    .acct-head { flex-direction: column; }
    .scorebox { text-align: left; }
  }
</style>
</head>

<script>

const LOCAL_KEY = 'ahm_local_data';
let DATA = { accounts: [], assessments: {} };
let LOCAL_MODE = false;
let saveTimer = null;

/* ================= Applicability ================= */
function isCRO(acc) { return /CRO/i.test(acc.serviceLines || ''); }
function behaviorsFor(acc) {
  return SECTIONS.flatMap(s => s.behaviors).filter(b => !b.croOnly || isCRO(acc));
}
function sectionBehaviorsFor(sec, acc) {
  return sec.behaviors.filter(b => !b.croOnly || isCRO(acc));
}

/* ================= Scoring =================
   effective status = manual if set, else auto (from CMT/Iris/Jira data).
   An account only earns a Health band when EVERY applicable signal is set
   AND the assessment was updated within the last 7 days. Otherwise: Not assessed. */
function effVal(values, auto, b) {
  if (values && values[b.id]) return values[b.id];
  if (auto && auto[b.id]) return auto[b.id].v;
  return null;
}

function assess(acc) {
  const A = DATA.assessments[acc.id] || {};
  const values = A.values || {}, auto = autoFor(acc.id);
  const list = behaviorsFor(acc);

  const tiers = {}, tierCounts = {};
  for (const t of Object.keys(TIER_WEIGHTS)) {
    const tl = list.filter(b => b.tier === t);
    let sum = 0; const c = { healthy: 0, warning: 0, critical: 0, unset: 0 };
    tl.forEach(b => { const v = effVal(values, auto, b); if (v) { sum += VAL[v]; c[v]++; } else c.unset++; });
    tiers[t] = tl.length ? sum / tl.length : 0;
    tierCounts[t] = { ...c, total: tl.length };
  }
  const wsum = Object.keys(TIER_WEIGHTS).reduce((a, t) => a + TIER_WEIGHTS[t] * tiers[t], 0);
  const wmax = Object.values(TIER_WEIGHTS).reduce((a, b) => a + b, 0);
  const pct = Math.round((wsum / wmax) * 100);
  const effBand = pct >= 85 ? 'GREEN' : pct >= 65 ? 'YELLOW' : pct >= 45 ? 'ORANGE' : 'RED';

  const filled = list.filter(b => effVal(values, auto, b)).length;
  const complete = filled === list.length;
  const fresh = A.updatedAt && (Date.now() - Date.parse(A.updatedAt)) < FRESH_MS;
  const displayBand = (complete && fresh) ? effBand : 'NONE';
  const staleReason = complete
    ? (fresh ? null : (A.updatedAt ? 'check-in older than 7 days' : 'no check-in yet'))
    : (list.length - filled) + ' of ' + list.length + ' signals unfilled';

  return { displayBand, effBand, pct, tiers, tierCounts, filled, total: list.length, updatedAt: A.updatedAt, staleReason };
}

function sectionStatus(sec, acc, values, auto) {
  const list = sectionBehaviorsFor(sec, acc);
  const assessed = list.filter(b => effVal(values, auto, b)).length;
  if (assessed === 0) return { band: 'NONE' };
  const avg = list.reduce((a, b) => { const v = effVal(values, auto, b); return a + (v ? VAL[v] : 0); }, 0) / list.length;
  const band = avg >= 0.85 ? 'GREEN' : avg >= 0.65 ? 'YELLOW' : avg >= 0.45 ? 'ORANGE' : 'RED';
  return { band };
}

/* Specific reasons an account is flagged: every effective warning/critical signal + evidence */
function reasons(acc) {
  const A = DATA.assessments[acc.id] || {};
  const values = A.values || {}, auto = autoFor(acc.id);
  const list = behaviorsFor(acc)
    .map(b => {
      const v = effVal(values, auto, b);
      if (!v || v === 'healthy') return null;
      const note = values[b.id] ? (noteFor(acc, b) || 'set manually — see section notes') : ((auto[b.id] || {}).note || '');
      return { b, v, note };
    })
    .filter(Boolean);
  list.sort((x, y) => (x.v === 'critical' ? 0 : 1) - (y.v === 'critical' ? 0 : 1));
  return list;
}
function noteFor(acc, b) {
  const A = DATA.assessments[acc.id] || {};
  const sec = SECTIONS.find(s => s.behaviors.some(x => x.id === b.id));
  const n = ((A.notes || {})[sec.id] || '').trim();
  return n ? n.slice(0, 120) : null;
}

/* Hazard: renewal within 90 days AND the data/assessment says Intervene or Crisis */
function hazardFor(acc, s) {
  const cd = cmtFor(acc.id);
  if (!cd.renewalDate) return null;
  const days = Math.round((new Date(cd.renewalDate + 'T00:00:00') - Date.now()) / 864e5);
  if (days > 90) return null;
  if (s.effBand !== 'ORANGE' && s.effBand !== 'RED') return null;
  return { days, date: cd.renewalDate };
}

const BAND_META = {
  GREEN:  { label: 'Healthy',      cls: 'green',  color: 'var(--green-t)' },
  YELLOW: { label: 'Monitor',      cls: 'yellow', color: 'var(--yellow-t)' },

  try { DATA = JSON.parse(localStorage.getItem(LOCAL_KEY)); } catch (e) { DATA = null; }

function queueSave(accountId) {
  clearTimeout(saveTimer);
  showChip('Saving…');
  saveTimer = setTimeout(async () => {
    const a = DATA.assessments[accountId] || {};
    const acc = DATA.accounts.find(x => String(x.id) === String(accountId));
    const s = acc ? assess(acc) : { pct: 0, effBand: 'NONE' };

    if (LOCAL_MODE) {
      a.updatedAt = new Date().toISOString();
      const today = a.updatedAt.slice(0, 10);
      a.history = (a.history || []).filter(h => h.date !== today);
      a.history.push({ date: today, score: s.pct, band: s.effBand });
      a.history.sort((x, y) => x.date.localeCompare(y.date));
      DATA.assessments[accountId] = a;
      try { localStorage.setItem(LOCAL_KEY, JSON.stringify(DATA)); showChip('Saved — this browser only', true); }
      catch (e) { showChip('Save failed', true); }
      return;
    }

    try {
      const r = await fetch('/api/assessment', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accountId, values: a.values || {}, notes: a.notes || {}, assessedBy: a.assessedBy || '', score: s.pct, band: s.effBand })
      });
      const j = await r.json();
      if (j.assessment) DATA.assessments[accountId] = Object.assign(DATA.assessments[accountId] || {}, { updatedAt: j.assessment.updatedAt, history: j.assessment.history });
      showChip('Saved', true);
    } catch (e) { showChip('Save failed — check connection', true); }
  }, 600);
}

function showChip(text, fade) {
  const chip = document.getElementById('savechip');
  if (!chip) return;
  chip.textContent = text;
  chip.classList.add('show');
  if (fade) setTimeout(() => chip.classList.remove('show'), 1600);
}

function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function pill(band, lg) {
  const m = BAND_META[band] || BAND_META.NONE;
  return `<span class="pill ${m.cls} ${lg ? 'lg' : ''}"><span class="dot"></span>${m.label}</span>`;
}
function fmtMoney(n) { return (n == null) ? null : '$' + Math.round(n).toLocaleString(); }
function fmtDate(d) {
  if (!d) return null;
  const dt = new Date(d + 'T00:00:00');
  return isNaN(dt) ? d : dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtShortDate(iso) {
  if (!iso) return null;
  const dt = new Date(iso);
  return isNaN(dt) ? null : dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function cmtFor(accountId) { return (CMT_DATA.accounts || {})[String(accountId)] || {}; }
function autoFor(accountId) { return cmtFor(accountId).auto || {}; }
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
function asOfDay() {
  const d = CMT_DATA.asOf ? new Date(CMT_DATA.asOf + 'T00:00:00') : new Date();
  return { day: d.getDate(), dim: new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate(), label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) };
}

/* ---------- Portfolio ---------- */
function renderPortfolio() {
  const q = (window._search || '').toLowerCase();
  const all = DATA.accounts
    .map(acc => { const s = assess(acc); return { acc, s, hz: hazardFor(acc, s) }; })
    .filter(({ acc }) => !q || acc.name.toLowerCase().includes(q));

  const counts = { GREEN: 0, YELLOW: 0, ORANGE: 0, RED: 0, NONE: 0 };
  DATA.accounts.forEach(acc => counts[assess(acc).displayBand]++);

  // CMT rollups
  const curM = (CMT_DATA.asOf || '').slice(0, 7);
  const byMonth = {};
  let totalMrr = 0, planCur = 0, actCur = 0;
  DATA.accounts.forEach(acc => {
    const cd = cmtFor(acc.id);
    totalMrr += cd.mrr || 0;
    (cd.mrrTrend || []).forEach(p => { byMonth[p.m] = (byMonth[p.m] || 0) + (p.v || 0); });
    const h = (cd.hoursTrend || []).find(x => x.m === curM);
    if (h) { planCur += h.planned || 0; actCur += h.actual || 0; }
  });
  const pTrend = Object.keys(byMonth).sort().map(m => ({ m, v: byMonth[m] }));
  const prev = pTrend.length >= 2 ? pTrend[pTrend.length - 2] : null;
  const mrrDelta = (prev && prev.v) ? Math.round((byMonth[curM] - prev.v) / prev.v * 100) : null;
  const { day, dim, label } = asOfDay();
  const expected = planCur * day / dim;
  const pace = expected > 0 ? Math.round(actCur / expected * 100) : null;
  const maxV = Math.max(...pTrend.map(p => p.v || 0), 1);
  const pSpark = pTrend.length >= 2
    ? `<div class="spark" style="margin-top:10px">${pTrend.map(p => `<div class="sb" title="${p.m}: ${fmtMoney(p.v)}" style="height:${Math.max(4, Math.round((p.v || 0) / maxV * 34))}px"></div>`).join('')}</div>`
    : '';

  // Grouping: hazards → not assessed → the rest (alphabetical)
  const hazards = all.filter(r => r.hz).sort((a, b) => a.hz.days - b.hz.days);
  const hazardIds = new Set(hazards.map(r => r.acc.id));
  const notAssessed = all.filter(r => !hazardIds.has(r.acc.id) && r.s.displayBand === 'NONE').sort((a, b) => a.acc.name.localeCompare(b.acc.name));
  const rest = all.filter(r => !hazardIds.has(r.acc.id) && r.s.displayBand !== 'NONE').sort((a, b) => a.acc.name.localeCompare(b.acc.name));

  const rowHtml = ({ acc, s }) => {
    const cd = cmtFor(acc.id);
    const h = (cd.hoursTrend || []).find(x => x.m === curM);
    return `
      <tr data-id="${esc(acc.id)}">
        <td><div class="acct-name">${esc(acc.name)}</div></td>
        <td><span class="svc">${esc(acc.serviceLines || '—')}</span></td>
        <td class="num">${fmtMoney(cd.mrr) || '—'}</td>
        <td class="num">${h && (h.planned || h.actual) ? Math.round(h.planned || 0) + ' / ' + Math.round(h.actual || 0) : '—'}</td>
        <td><span class="svc">${s.filled}/${s.total}${s.updatedAt ? ' · ' + fmtShortDate(s.updatedAt) : ''}</span></td>
        <td>${pill(s.displayBand)}</td>
      </tr>`;
  };

  const tableHead = `<thead><tr><th>Account</th><th>Service lines</th><th>MRR</th><th>Hrs plan / MTD</th><th>Signals</th><th>Status</th></tr></thead>`;

  const hazardTable = hazards.length ? `
    <div class="group-title" style="color:var(--red-t)">⚠️ Renewal risk — Intervene/Crisis with renewal ≤90 days <span class="sub">${hazards.length} account${hazards.length > 1 ? 's' : ''}</span></div>
    <div class="table-card" style="border-color:var(--red-br)">
    <table class="roster">
      <thead><tr><th>Account</th><th>Renews</th><th>Status</th><th>Why (from data)</th></tr></thead>
      <tbody>
        ${hazards.map(({ acc, s, hz }) => {
          const why = reasons(acc).filter(r => r.v === 'critical').slice(0, 3).map(r => r.b.label);
          return `<tr data-id="${esc(acc.id)}">
            <td><div class="acct-name">⚠️ ${esc(acc.name)}</div></td>
            <td class="num" style="color:var(--red-t)">${fmtDate(hz.date)} (${hz.days < 0 ? 'past' : hz.days + 'd'})</td>
            <td>${pill(s.displayBand)}${s.displayBand === 'NONE' ? `<div class="svc" style="margin-top:3px">data says ${BAND_META[s.effBand].label}</div>` : ''}</td>
            <td class="flags">${why.length ? esc(why.join(' · ')) : 'see account page'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>` : '';

  const group = (title, sub, rows) => rows.length ? `
    <div class="group-title">${title} <span class="sub">${sub}</span></div>
    <div class="table-card"><table class="roster">${tableHead}<tbody>${rows.map(rowHtml).join('')}</tbody></table></div>` : '';

  app.innerHTML = `
    <div class="eyebrow"><span>Account Health · Cro Metrics</span><span class="right">${LOCAL_MODE ? 'Local mode — saved in this browser only' : 'Growth Strategy × Client Services'}</span></div>
    <h1 class="title">Portfolio</h1>
    <p class="meta">${DATA.accounts.length} active accounts from CMT · a health band counts only when every signal is filled and the check-in is under 7 days old</p>

    <div class="metrics">
      <div class="metric"><div class="k">Total MRR (current mo)</div><div class="v">${fmtMoney(totalMrr) || '—'}</div><div class="s">${mrrDelta == null ? 'across portfolio' : (mrrDelta >= 0 ? '+' : '') + mrrDelta + '% vs prior month'}</div></div>
      <div class="metric"><div class="k">Portfolio MRR trend</div>${pSpark || '<div class="v">—</div>'}<div class="s">last ${pTrend.length} months</div></div>
      <div class="metric"><div class="k">Planned hrs (mo)</div><div class="v">${Math.round(planCur).toLocaleString()}h</div><div class="s">Harvest via CMT</div></div>
      <div class="metric"><div class="k">Actual hrs (MTD)</div><div class="v">${Math.round(actCur).toLocaleString()}h</div><div class="s">${pace == null ? '' : pace + '% of plan through ' + label + (pace > 115 ? ' — hot' : pace < 85 ? ' — under' : '')}</div></div>
    </div>
    <div class="metrics" style="margin-top:-8px">
      <div class="metric"><div class="k">Healthy</div><div class="v" style="color:var(--green-t)">${counts.GREEN}</div></div>
      <div class="metric"><div class="k">Monitor</div><div class="v" style="color:var(--yellow-t)">${counts.YELLOW}</div></div>
      <div class="metric"><div class="k">Intervene</div><div class="v" style="color:var(--orange-t)">${counts.ORANGE}</div></div>
      <div class="metric"><div class="k">Crisis</div><div class="v" style="color:var(--red-t)">${counts.RED}</div></div>
      <div class="metric"><div class="k">Not assessed</div><div class="v" style="color:var(--gray-t)">${counts.NONE}</div></div>
    </div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Filter accounts…" value="${esc(window._search || '')}">

    ${hazardTable}

  `;

  document.querySelectorAll('tbody tr').forEach(tr =>
    tr.addEventListener('click', () => { location.hash = '#/account/' + tr.dataset.id; }));
  const search = document.getElementById('search');
  search.addEventListener('input', () => { window._search = search.value; renderPortfolio(); const el = document.getElementById('search'); el.focus(); el.setSelectionRange(el.value.length, el.value.length); });
  document.getElementById('exportBtn').addEventListener('click', exportReport);

/* ---------- Account metrics header ---------- */
function accountMetrics(acc) {
  const cd = cmtFor(acc.id);
  const curM = (CMT_DATA.asOf || '').slice(0, 7);
  const { day, dim, label } = asOfDay();
  const cards = [];

  if (cd.mrr != null) cards.push({ k: 'MRR (current mo)', v: fmtMoney(cd.mrr), s: cd.mrrNote || '' });

  const maxV = Math.max(...(cd.mrrTrend || []).map(p => p.v || 0), 0);
  if ((cd.mrrTrend || []).length >= 2 && maxV > 0) cards.push({
    k: 'MRR trend',
    raw: `<div class="spark" style="margin-top:10px">${cd.mrrTrend.map(p => `<div class="sb" title="${p.m}: ${fmtMoney(p.v)}" style="height:${Math.max(4, Math.round((p.v || 0) / maxV * 34))}px"></div>`).join('')}</div>`,
    s: 'last ' + cd.mrrTrend.length + ' months'
  });

  if (cd.forecast) cards.push({ k: 'Forecast (next mo)', v: cd.forecast.v != null ? fmtMoney(cd.forecast.v) : '—', s: cd.forecast.note || '' });

  if (cd.renewalDate || cd.renewalStatus) cards.push({
    k: 'Renewal', vsm: fmtDate(cd.renewalDate) || '—',
    s: cd.renewalStatus || ((autoFor(acc.id).renewal || {}).note || '')
  });

  const im = cd.impact;
  if (im) {
    if (im.revImpact != null && im.revImpact > 0) cards.push({ k: 'Revenue impact (6m)', v: fmtMoney(im.revImpact), s: 'Impact Dashboard · Jan–Jun' });
    if (isCRO(acc)) cards.push({ k: 'Tests (6m)', v: String(im.tests6m ?? 0), s: `${im.wins6m ?? 0} wins · ${im.winRate ?? 0}% win rate` });
    if (im.churnRisk) {
      const cc = { high: 'var(--red-t)', medium: 'var(--orange-t)', low: 'var(--green-t)' }[im.churnRisk] || 'var(--ink)';
      cards.push({ k: 'Churn risk (CMT)', raw: `<div class="v" style="color:${cc}">${cap(im.churnRisk)}</div>`, s: 'Impact Dashboard' });
    }
    if (im.strategist || im.director) cards.push({ k: 'Team', vsm: im.strategist || '—', s: im.director ? 'Director: ' + im.director : '' });
  }

  const h = (cd.hoursTrend || []).find(x => x.m === curM);
  if (h && (h.planned || h.actual != null)) {
    cards.push({ k: 'Hours — this mo', v: (h.actual != null ? Math.round(h.actual) : 0) + 'h', s: 'of ' + (h.planned != null ? Math.round(h.planned) : '—') + 'h planned · logged through ' + label });
    if (h.planned && h.actual != null) {
      const pace = Math.round(h.actual / (h.planned * day / dim) * 100);
      cards.push({ k: 'Burn pace (MTD)', v: pace + '%', s: 'actual vs plan through ' + label + (pace > 115 ? ' — hot' : pace < 85 ? ' — under plan' : ' — on plan') });
    }
  }

  const closed = (cd.hoursTrend || []).filter(x => x.m < curM && x.planned && x.actual != null).pop();
  if (closed) {
    const mLabel = new Date(closed.m + '-01T00:00:00').toLocaleDateString('en-US', { month: 'short' });
    cards.push({ k: `Burn — ${mLabel} (full mo)`, v: Math.round(closed.actual / closed.planned * 100) + '%', s: `${Math.round(closed.actual)}h of ${Math.round(closed.planned)}h planned in ${mLabel}` });
  }

  const dv = cd.deliverables;
  if (dv && isCRO(acc)) cards.push({ k: 'Tests launched (30d)', v: String(dv.launched30d ?? 0), s: (dv.inProgress ?? 0) + ' in progress · ' + (dv.backlog ?? 0) + ' backlog' });

  if (!cards.length) return '';
  return `<div class="metrics" style="margin:18px 0 8px">${cards.map(c =>
    `<div class="metric"><div class="k">${c.k}</div>${c.raw || (c.vsm ? `<div class="v sm">${esc(c.vsm)}</div>` : `<div class="v">${esc(c.v)}</div>`)}${c.s ? `<div class="s">${esc(c.s)}</div>` : ''}</div>`).join('')}</div>`;
}

/* ---------- Section data strips ---------- */
function dataStrip(items, src, extra) {
  const li = items.filter(i => i[1] != null && i[1] !== '');
  if (!li.length && !extra) return '';
  return `<div class="dstrip">${li.map(([k, v, n]) =>
    `<div class="d"><div class="dk">${k}</div><div class="dv">${esc(v)}</div>${n ? `<div class="dn">${esc(n)}</div>` : ''}</div>`).join('')}
    ${extra || ''}
    <div class="dsrc">${esc(src || 'CMT')}${CMT_DATA.asOf ? ' · ' + CMT_DATA.asOf : ''}</div></div>`;
}

function hoursTable(trend) {
  if (!trend || !trend.length) return '';
  const curM = (CMT_DATA.asOf || '').slice(0, 7);
  return `<div class="d"><div class="dk">Planned vs actual (over/under)</div><table class="mini"><thead><tr><th>Month</th><th>Plan</th><th>Actual</th><th>±</th></tr></thead><tbody>
    ${trend.slice(-5).map(r => {
      const isMTD = r.m === curM;
      const d = (r.planned && r.actual != null && !isMTD) ? Math.round((r.actual - r.planned) / r.planned * 100) : null;
      return `<tr><td>${r.m}${isMTD ? '*' : ''}</td><td>${r.planned != null ? Math.round(r.planned) : '—'}</td><td>${r.actual != null ? Math.round(r.actual) : '—'}</td><td class="${d > 20 || d < -30 ? 'bad' : ''}">${d == null ? '—' : (d > 0 ? '+' : '') + d + '%'}</td></tr>`;
    }).join('')}</tbody></table><div class="dn">* month to date</div></div>`;
}

function peopleTable(accountId) {
  const ppl = cmtFor(accountId).people;
  if (!ppl || !ppl.length) return '';
  const { day, dim, label } = asOfDay();
  return `<div class="d"><div class="dk">Per-person burn — plan vs actual (MTD)</div><table class="mini"><thead><tr><th>Person</th><th>Plan (mo)</th><th>MTD</th><th>Pace</th></tr></thead><tbody>
    ${ppl.slice(0, 8).map(p => {
      const prorated = (p.planned || 0) * day / dim;
      const pace = (p.planned >= 4 && prorated > 0 && p.actual != null) ? Math.round(p.actual / prorated * 100) : null;
      const cls = pace == null ? '' : pace > 130 ? 'bad' : pace < 70 ? 'low' : '';
      const flag = pace == null ? '—' : pace + '%' + (pace > 130 ? ' hot' : pace < 70 ? ' low' : '');
      return `<tr><td>${esc(p.name)}${p.role ? ` <span class="svc">· ${esc(p.role)}</span>` : ''}</td><td>${Math.round(p.planned || 0)}h</td><td>${p.actual != null ? Math.round(p.actual) + 'h' : '—'}</td><td class="${cls}">${flag}</td></tr>`;
    }).join('')}</tbody></table><div class="dn">pace = actual vs each person's plan prorated through ${label}</div></div>`;
}

function sectionStrip(secId, acc) {
  const cd = cmtFor(acc.id);
  if (secId === 'financials') return dataStrip([
    ['MRR (current mo)', fmtMoney(cd.mrr), cd.mrrNote],
    ['Forecast (next mo)', cd.forecast ? (cd.forecast.v != null ? fmtMoney(cd.forecast.v) : '—') : null, cd.forecast ? cd.forecast.note : null],
    ['Renewal', fmtDate(cd.renewalDate), cd.renewalStatus]
  ], 'CMT');
  if (secId === 'team') return dataStrip([], 'Harvest via CMT', hoursTable(cd.hoursTrend) + peopleTable(acc.id));
  if (secId === 'deliverables') {
    const dv = cd.deliverables;
    if (!dv) return '';
    const items = isCRO(acc)
      ? [['Launched (30d)', String(dv.launched30d ?? 0), (dv.launched14d || 0) + ' in last 14d'], ['In progress', dv.inProgress != null ? String(dv.inProgress) : null], ['Backlog', dv.backlog != null ? String(dv.backlog) : null]]
      : [['In progress', dv.inProgress != null ? String(dv.inProgress) : null], ['Resolved (30d)', dv.resolved30d != null ? String(dv.resolved30d) : null]];
    return dataStrip(items, dv.source || 'Iris / Jira');
  }
  return '';
}

/* ---------- Account page ---------- */
function renderAccount(id) {
  const acc = DATA.accounts.find(a => String(a.id) === String(id));
  if (!acc) { location.hash = '#/'; return; }
  const A = DATA.assessments[acc.id] = DATA.assessments[acc.id] || { values: {}, notes: {}, history: [] };
  A.values = A.values || {}; A.notes = A.notes || {};
  const s = assess(acc);
  const auto = autoFor(acc.id);
  const bandMeta = BAND_META[s.displayBand];
  const hz = hazardFor(acc, s);
  const why = reasons(acc);
  const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const tierCards = Object.keys(TIER_WEIGHTS).map(t => {
    const c = s.tierCounts[t];
    const share = c.total ? (c.healthy + c.warning * 0.5) / c.total : 0;
    const color = share >= 0.85 ? 'var(--green-t)' : share >= 0.65 ? 'var(--yellow-t)' : share >= 0.45 ? 'var(--orange-t)' : 'var(--red-t)';
    const bits = [];
    if (c.healthy) bits.push(`<span style="color:var(--green-t)">${c.healthy} healthy</span>`);
    if (c.warning) bits.push(`<span style="color:var(--yellow-t)">${c.warning} warning</span>`);
    if (c.critical) bits.push(`<span style="color:var(--red-t)">${c.critical} critical</span>`);
    if (c.unset) bits.push(`<span>${c.unset} unfilled</span>`);
    return `<div class="tier"><div class="k"><span>${TIER_NAMES[t]}</span><span class="w">${TIER_WEIGHTS[t]}% of overall</span></div>
      <div class="track"><div class="fill" style="width:${Math.round(share * 100)}%;background:${c.unset === c.total ? 'var(--gray-br)' : color}"></div></div>
      <div class="cnt">${bits.join(' · ') || 'no signals'}</div></div>`;
  }).join('');

  const hazardHtml = hz ? `
    <div class="hazard"><div class="icon">⚠️</div><div class="txt">
      <b>Renewal risk.</b> This account is <b>${BAND_META[s.effBand].label}</b>${s.displayBand === 'NONE' ? ' (from data — check-in incomplete)' : ''} and renews <b>${fmtDate(hz.date)}</b> (${hz.days < 0 ? 'date has passed' : hz.days + ' days out'}). Renewal plan + owner needed now.
    </div></div>` : '';

  const whyHtml = why.length ? `
    <div class="why" style="border-left-color:${why.some(r => r.v === 'critical') ? 'var(--red-t)' : 'var(--orange-t)'}">
      <h3>Why — specific flags</h3>
      ${why.map(r => `<div class="row"><span class="dot ${r.v}"></span><span><span class="lbl">${esc(r.b.label)}</span> <span class="ev">— ${esc(r.note || cap(r.v))}</span></span></div>`).join('')}
    </div>` : '';

  const hist = (A.history || []).slice(-16);
  const histHtml = hist.length ? `
    <div class="history">${hist.map(h => {
      const m = BAND_META[h.band] || BAND_META.NONE;
      return `<div class="bar" title="${h.date}: ${m.label}" style="background:${m.color}"></div>`;
    }).join('')}</div>
    <div class="hint">Weekly check-in history — one bar per saved day</div>` : '';

  app.innerHTML = `
    <div class="eyebrow"><a href="#/" class="backlink">← Portfolio</a><span class="right">Snapshot as of <b>${today}</b>${LOCAL_MODE ? ' · local mode' : ''}</span></div>

    <div class="acct-head">
      <div>
        <h1 class="title">${esc(acc.name)}</h1>
        <p class="meta">CMT <code>#${esc(acc.id)}</code>${acc.serviceLines ? ' · ' + esc(acc.serviceLines) : ''}${acc.cmtHealth ? ' · CMT health: ' + esc(acc.cmtHealth) : ''}</p>
        <p class="meta" style="margin-top:10px">${pill(s.displayBand, true)}${(acc.pulseUrl || PULSE_URLS[acc.id]) ? ` <a class="btn" style="margin-left:10px;padding:5px 12px;font-size:12px" href="${esc(acc.pulseUrl || PULSE_URLS[acc.id])}" target="_blank" rel="noopener">Account Pulse ↗</a>` : ''}</p>
      </div>
      <div class="scorebox">
        <div class="cap"><b>${s.filled}/${s.total}</b> signals filled${s.staleReason ? ` · <span style="color:var(--orange-t)">${esc(s.staleReason)}</span>` : ''}</div>
        <div class="cap">Last check-in: <b>${s.updatedAt ? fmtShortDate(s.updatedAt) : 'never'}</b> · refresh weekly</div>
        <div class="cap assessor" style="margin-top:8px">Assessed by <input id="assessor" placeholder="name" value="${esc(A.assessedBy || '')}"></div>
      </div>
    </div>

    ${hazardHtml}
    ${whyHtml}
    ${accountMetrics(acc)}

    <div class="tierbar">${tierCards}</div>

    <div class="section" style="border-left:3px solid ${bandMeta.color}">
      <div class="section-body" style="padding:14px 22px">
        <b style="font-size:13px">Play to run:</b> <span style="font-size:13px;color:var(--muted)">${ESCALATION[s.displayBand]}</span>
      </div>
    </div>

    ${SECTIONS.map(sec => {
      const behaviors = sectionBehaviorsFor(sec, acc);
      if (!behaviors.length) return '';
      const st = sectionStatus(sec, acc, A.values, auto);
      return `
      <div class="section">
        <div class="section-head">
          <div><h2>${sec.title}</h2><div class="sub">${sec.sub}</div></div>
          ${pill(st.band)}
        </div>
        <div class="section-body">
          ${sectionStrip(sec.id, acc)}
          ${behaviors.map(b => {
            const manual = A.values[b.id] || '';
            const a = auto[b.id];
            const v = manual || (a ? a.v : '');
            const autoLine = a
              ? `<div class="autoline ${manual ? '' : 'live'}">${manual ? `Manual override (auto: ${cap(a.v)} — click your selection to revert)` : `Auto from data`} · ${esc(a.note)}</div>`
              : '';
            return `
            <div class="brow">
              <div class="info">
                <div class="label">${b.label}<span class="tags"><span class="tag">${b.tier}</span><span class="tag">${b.owner}</span>${a ? '<span class="tag auto">auto</span>' : ''}</span></div>
                <div class="crit" title="Warning: ${esc(b.warning)} · Critical: ${esc(b.critical)}">Healthy: ${b.healthy}</div>
                ${autoLine}
              </div>
              <div class="seg" data-behavior="${b.id}">
                <button data-v="healthy"  class="${v === 'healthy' ? 'on-healthy' : ''}">Healthy</button>
                <button data-v="warning"  class="${v === 'warning' ? 'on-warning' : ''}">Warning</button>
                <button data-v="critical" class="${v === 'critical' ? 'on-critical' : ''}">Critical</button>
              </div>
            </div>`;
          }).join('')}
          <textarea class="notes" data-section="${sec.id}" placeholder="Notes & root cause for this section (required if Warning/Critical)…">${esc(A.notes[sec.id] || '')}</textarea>
        </div>
      </div>`;
    }).join('')}

    ${histHtml}

    <div class="savebar"><span class="chip" id="savechip">Saved</span></div>
    <div class="footer">Signals tagged <b>auto</b> are scored from CMT / Iris / Jira data as of ${CMT_DATA.asOf || '—'} (refreshed weekly); click a different value to override, click your selection again to revert. The health band only counts when all ${s.total} signals are set and the check-in is under 7 days old. ${LOCAL_MODE ? 'Changes save in this browser only.' : 'Changes auto-save for the whole team.'}</div>
  `;

  document.querySelectorAll('.seg').forEach(seg => {
    seg.addEventListener('mousedown', () => { window._scrollY = window.scrollY; });
    seg.addEventListener('click', (e) => {
      const btn = e.target.closest('button'); if (!btn) return;
      const bid = seg.dataset.behavior;
      const v = btn.dataset.v;
      if (A.values[bid] === v) delete A.values[bid]; else A.values[bid] = v;
      A.updatedAt = new Date().toISOString();
      queueSave(acc.id);
      renderAccount(acc.id);
      window.scrollTo(0, window._scrollY || 0);
    });
  });
  document.querySelectorAll('textarea.notes').forEach(t => {
    t.addEventListener('input', () => { A.notes[t.dataset.section] = t.value; A.updatedAt = new Date().toISOString(); queueSave(acc.id); });
  });
  document.getElementById('assessor').addEventListener('input', (e) => { A.assessedBy = e.target.value; queueSave(acc.id); });
}

/* ================= Weekly report export ================= */
function exportReport() {
  const date = new Date().toISOString().slice(0, 10);
  const rows = DATA.accounts.map(acc => ({ acc, a: DATA.assessments[acc.id] || {}, s: assess(acc), hz: null }));
  rows.forEach(r => r.hz = hazardFor(r.acc, r.s));

  let md = `# Account Health — Weekly Report\n**Generated:** ${date}\n\n`;
  const counts = { GREEN: 0, YELLOW: 0, ORANGE: 0, RED: 0, NONE: 0 };
  rows.forEach(r => counts[r.s.displayBand]++);
  md += `| Status | Count |\n|---|---|\n| 🟢 Healthy | ${counts.GREEN} |\n| 🟡 Monitor | ${counts.YELLOW} |\n| 🟠 Intervene | ${counts.ORANGE} |\n| 🔴 Crisis | ${counts.RED} |\n| ⚪ Not assessed | ${counts.NONE} |\n\n`;

  const hazards = rows.filter(r => r.hz).sort((a, b) => a.hz.days - b.hz.days);
  if (hazards.length) {
    md += `## ⚠️ Renewal risk (Intervene/Crisis, renewal ≤90 days)\n\n`;
    hazards.forEach(({ acc, s, hz }) => {
      const why = reasons(acc).filter(r => r.v === 'critical').map(r => r.b.label).join('; ');
      md += `- **${acc.name}** — renews ${hz.date} (${hz.days < 0 ? 'past' : hz.days + 'd'}) — ${BAND_META[s.effBand].label}${why ? ' — ' + why : ''}\n`;
    });
    md += '\n---\n\n';
  }

  for (const { acc, a, s } of rows.sort((x, y) => x.acc.name.localeCompare(y.acc.name))) {
    if (s.displayBand === 'NONE' && !reasons(acc).length) continue;
    const flag = { GREEN: '🟢', YELLOW: '🟡', ORANGE: '🟠', RED: '🔴', NONE: '⚪' }[s.displayBand];
    md += `## ${flag} ${acc.name} — ${BAND_META[s.displayBand].label}\n`;
    md += `${s.filled}/${s.total} signals · last check-in ${a.updatedAt ? a.updatedAt.slice(0, 10) : 'never'}${a.assessedBy ? ' · by ' + a.assessedBy : ''}\n\n`;
    const list = reasons(acc);
    const bad = list.filter(r => r.v === 'critical');
    const warn = list.filter(r => r.v === 'warning');
    if (bad.length) md += `**Critical:** ${bad.map(r => r.b.label + (r.note ? ` (${r.note})` : '')).join('; ')}\n\n`;
    if (warn.length) md += `**Warning:** ${warn.map(r => r.b.label).join('; ')}\n\n`;
    const notes = Object.entries(a.notes || {}).filter(([, v]) => v && v.trim());
    if (notes.length) md += notes.map(([k, v]) => `**Notes (${k}):** ${v.trim()}`).join('\n\n') + '\n\n';
  }
  md += `\n*CMT/Iris/Jira data as of ${CMT_DATA.asOf || '—'}. Generated from the Account Health Monitor.*\n`;

  const blob = new Blob([md], { type: 'text/markdown' });
  const aEl = document.createElement('a');
  aEl.href = URL.createObjectURL(blob);
  aEl.download = `account-health-report-${date}.md`;
  aEl.click();
}

/* ================= Router ================= */
async function route() {
  const m = location.hash.match(/^#\/account\/(.+)$/);
  if (m) renderAccount(decodeURIComponent(m[1]));
  else renderPortfolio();
}

window.addEventListener('hashchange', route);
loadData().then(route);
</script>
